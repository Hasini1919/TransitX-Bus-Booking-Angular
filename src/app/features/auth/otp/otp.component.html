<div class="otp-backdrop" (click)="onBackdropClick($event)">
  <div class="otp-card" role="dialog" aria-modal="true" aria-labelledby="otp-title">

    <div class="otp-header">
      <div class="otp-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="5" y="2" width="14" height="20" rx="2"/>
          <line x1="12" y1="18" x2="12.01" y2="18"/>
        </svg>
      </div>
      <h2 id="otp-title">Verify Your Number</h2>
      <p class="otp-subtitle">
        We sent a 5-digit code to<br>
        <strong>+94 xxxxxx{{ phone.slice(-3) }}</strong>
      </p>
    </div>

    <div class="otp-inputs">
      <input
        *ngFor="let i of [0,1,2,3,4]; let idx = index"
        #otpInput
        type="text"
        inputmode="numeric"
        maxlength="1"
        class="otp-digit"
        [class.filled]="digits[idx]"
        [class.error]="hasError"
        [(ngModel)]="digits[idx]"
        (input)="onInput($event, idx)"
        (keydown)="onKeydown($event, idx)"
        (paste)="onPaste($event)"
        [id]="'otp-' + idx"
        autocomplete="one-time-code"
      />
    </div>

    <p class="error-msg" *ngIf="hasError">{{ errorMessage }}</p>
    <p class="success-msg" *ngIf="successMessage">{{ successMessage }}</p>

    <button
      class="btn-verify"
      (click)="verify()"
      [disabled]="loading || otpCode.length < 5"
    >
      <span *ngIf="!loading">Verify &amp; Continue</span>
      <span *ngIf="loading" class="spinner"></span>
    </button>

    <div class="resend-row">
      <span *ngIf="countdown > 0" class="countdown">
        Resend OTP in <strong>{{ countdown }}s</strong>
      </span>
      <button
        *ngIf="countdown === 0"
        class="btn-resend"
        (click)="resend()"
        [disabled]="resending"
      >
        {{ resending ? 'Sending...' : 'Resend OTP' }}
      </button>
    </div>

    <button class="btn-close" (click)="close()" aria-label="Close">✕</button>
  </div>
</div>
