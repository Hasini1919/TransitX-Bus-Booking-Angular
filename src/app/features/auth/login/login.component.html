<div class="auth-root">
    <!-- Left panel -->
    <div class="auth-panel left-panel">
      <div class="brand">
        <div class="brand-logo">
          <svg viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="20" fill="rgba(255,255,255,0.15)"/>
            <path d="M20 8 L30 28 L20 24 L10 28 Z" fill="white"/>
          </svg>
        </div>
        <span class="brand-name">TransitX</span>
      </div>
  
      <div class="panel-copy">
        <h1>Welcome<br>back.</h1>
        <p>Your next journey is just one tap away. Sign in to continue exploring.</p>
      </div>
  
      <div class="panel-shapes">
        <div class="shape s1"></div>
        <div class="shape s2"></div>
        <div class="shape s3"></div>
      </div>
    </div>
  
    <!-- Right panel -->
    <div class="auth-panel right-panel">
      <div class="form-container">
        <div class="form-header">
          <h2>Sign In</h2>
          <p>Enter your registered mobile number</p>
        </div>
  
        <div class="field-group">
          <label for="phone">Mobile Number</label>
          <div class="input-wrap" [class.input-error]="phoneError">
            <span class="input-prefix">+94</span>
            <input
              id="phone"
              type="tel"
              inputmode="numeric"
              placeholder="77 123 4567"
              [(ngModel)]="phone"
              (input)="onPhoneInput()"
              (keyup.enter)="handleLogin()"
              maxlength="9"
              autocomplete="tel"
            />
          </div>
          <p class="field-error" *ngIf="phoneError">{{ phoneError }}</p>
        </div>
  
        <div class="toast" *ngIf="toast.type"
           [class.toast-success]="toast.type === 'success'"
           [class.toast-error]="toast.type === 'error'">
        <span class="toast-icon">{{ toast.type === 'success' ? '✓' : '✕' }}</span>
        {{ toast.message }}
      </div>
  
        <button
          class="btn-primary"
          (click)="handleLogin()"
          [disabled]="loading"
        >
          <span *ngIf="!loading">Send OTP</span>
          <span *ngIf="loading" class="spinner"></span>
        </button>
  
        <div class="form-footer">
          Don't have an account?
          <a routerLink="/register">Create one</a>
        </div>
      </div>
    </div>
  </div>
  
  <!-- OTP Modal -->
  <app-otp-modal
    *ngIf="showOtp"
    [phone]="phone"
    (verified)="onVerified()"
    (closed)="showOtp = false"
  />
